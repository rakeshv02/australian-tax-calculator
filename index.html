<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Australian Tax Calculator 2025–26 – PAYG Take-Home Pay | Tabutility</title>
  <meta name="description" content="Free Australian income tax calculator for 2024-25. Calculate PAYG withholding, Medicare levy, and take-home pay. Includes LITO and all ATO tax brackets." />
  <meta name="keywords" content="Australian tax calculator, PAYG calculator, ATO tax 2024, take home pay Australia, Medicare levy, income tax Australia" />
  <link rel="canonical" href="https://australian-tax-calculator.tabutility.com/" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-78VZWJ5B1W"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-78VZWJ5B1W');</script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7039091592734005" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}body{background:#f0fdf4;}
    #ad-top{text-align:center;padding:10px;background:#fff;border-bottom:1px solid #d1fae5;}
    #ad-bottom{text-align:center;padding:20px;background:#fff;border-top:1px solid #d1fae5;margin-top:20px;}
    .site-nav{background:#1a1a2e;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
    .site-nav a{color:#a5b4fc;text-decoration:none;font-size:14px;font-family:'Segoe UI',Arial,sans-serif;}
    .site-nav a:hover{color:#fff;}.nav-brand{color:#fff;font-weight:700;font-size:16px;font-family:'Segoe UI',Arial,sans-serif;}
  </style>
</head>
<body>
  <nav class="site-nav"><span class="nav-brand">⚡ Tabutility</span><a href="https://tabutility.com">← All Tools</a></nav>
  <div id="ad-top"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
  <div id="root"></div>
  <div id="ad-bottom"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="rectangle" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
  <script type="text/babel">
    //<![CDATA[
    const { useState } = React;

    // ATO 2025-26 tax brackets (resident) — source: ato.gov.au (updated 1 June 2026)
    const TAX_BRACKETS_RESIDENT = [
      { min: 0, max: 18200, rate: 0 },
      { min: 18200, max: 45000, rate: 0.16 },
      { min: 45000, max: 135000, rate: 0.30 },
      { min: 135000, max: 190000, rate: 0.37 },
      { min: 190000, max: Infinity, rate: 0.45 },
    ];

    // Non-resident brackets
    const TAX_BRACKETS_NONRESIDENT = [
      { min: 0, max: 135000, rate: 0.325 },
      { min: 135000, max: 190000, rate: 0.37 },
      { min: 190000, max: Infinity, rate: 0.45 },
    ];

    function calcTax(income, brackets) {
      let tax = 0;
      for (const b of brackets) {
        if (income <= b.min) break;
        tax += (Math.min(income, b.max) - b.min) * b.rate;
      }
      return tax;
    }

    function calcLITO(income) {
      // Low Income Tax Offset 2025-26 — source: ato.gov.au (last updated 8 June 2026)
      if (income <= 37500) return 700;
      if (income <= 45000) return 700 - ((income - 37500) * 0.05);
      if (income <= 66667) return 325 - ((income - 45000) * 0.015);
      return 0;
    }

    function calcMedicareLevy(income, resident) {
      if (!resident) return 0;
      const shade_in_threshold = 26000;
      const full_threshold = 32500;
      if (income <= shade_in_threshold) return 0;
      if (income <= full_threshold) return (income - shade_in_threshold) * 0.1;
      return income * 0.02;
    }

    const fmt = (n, symbol = "$") => symbol + Math.round(n).toLocaleString();
    const pct = n => (n * 100).toFixed(1) + "%";
    const PERIODS = { annual: 1, monthly: 12, fortnightly: 26, weekly: 52 };
    const PERIOD_LABEL = { annual: "Annual", monthly: "Monthly", fortnightly: "Fortnightly", weekly: "Weekly" };

    function App() {
      const [income, setIncome] = useState("80000");
      const [resident, setResident] = useState(true);
      const [period, setPeriod] = useState("annual");
      const [superPct, setSuperPct] = useState("12");
      const [result, setResult] = useState(null);

      const calculate = () => {
        const annualIncome = parseFloat(income) || 0;
        const superRate = (parseFloat(superPct) || 0) / 100;
        const brackets = resident ? TAX_BRACKETS_RESIDENT : TAX_BRACKETS_NONRESIDENT;

        const incomeTax = calcTax(annualIncome, brackets);
        const lito = resident ? calcLITO(annualIncome) : 0;
        const taxAfterOffset = Math.max(0, incomeTax - lito);
        const medicareLevy = calcMedicareLevy(annualIncome, resident);
        const totalTax = taxAfterOffset + medicareLevy;
        const netAnnual = annualIncome - totalTax;
        const effectiveRate = annualIncome > 0 ? totalTax / annualIncome : 0;
        const superAmt = annualIncome * superRate;
        const periods = PERIODS[period];

        setResult({
          annualIncome, incomeTax, lito, taxAfterOffset, medicareLevy, totalTax, netAnnual, effectiveRate, superAmt,
          perPeriod: { gross: annualIncome / periods, net: netAnnual / periods, tax: totalTax / periods, super: superAmt / periods }
        });
      };

      const inputStyle = { width: "100%", padding: "12px", border: "2px solid #bbf7d0", borderRadius: 10, fontSize: 16, boxSizing: "border-box", outline: "none" };
      const labelStyle = { display: "block", fontWeight: 600, marginBottom: 6, color: "#333" };
      const pl = PERIOD_LABEL[period];

      return (
        <div style={{ fontFamily: "'Segoe UI',Arial,sans-serif", background: "#f0fdf4", minHeight: "100vh", padding: "20px" }}>
          <div style={{ maxWidth: 820, margin: "0 auto" }}>
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ fontSize: 48, marginBottom: 8 }}>🇦🇺</div>
              <h1 style={{ margin: 0, fontSize: 32, fontWeight: 800, color: "#1a1a2e" }}>Australian Tax Calculator</h1>
              <p style={{ margin: "8px 0 0", color: "#555", fontSize: 16 }}>PAYG withholding, Medicare levy & take-home pay — 2025–26</p>
            </div>

            <div style={{ background: "#fff", borderRadius: 16, padding: 28, boxShadow: "0 4px 24px rgba(0,0,0,0.08)", marginBottom: 24 }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 20 }}>
                <div>
                  <label style={labelStyle}>Annual Income (AUD)</label>
                  <div style={{ position: "relative" }}>
                    <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: "#666", fontWeight: 600 }}>$</span>
                    <input type="number" value={income} onChange={e => setIncome(e.target.value)} style={{ ...inputStyle, paddingLeft: 28 }} />
                  </div>
                </div>
                <div>
                  <label style={labelStyle}>Residency Status</label>
                  <select value={resident ? "resident" : "nonresident"} onChange={e => setResident(e.target.value === "resident")} style={inputStyle}>
                    <option value="resident">Australian Resident</option>
                    <option value="nonresident">Non-Resident</option>
                  </select>
                </div>
                <div>
                  <label style={labelStyle}>Pay Period</label>
                  <select value={period} onChange={e => setPeriod(e.target.value)} style={inputStyle}>
                    <option value="annual">Annual</option>
                    <option value="monthly">Monthly</option>
                    <option value="fortnightly">Fortnightly</option>
                    <option value="weekly">Weekly</option>
                  </select>
                </div>
                <div>
                  <label style={labelStyle}>Super Rate (%)</label>
                  <div style={{ position: "relative" }}>
                    <input type="number" value={superPct} min="0" max="30" onChange={e => setSuperPct(e.target.value)} style={{ ...inputStyle, paddingRight: 32 }} />
                    <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: "#666", fontWeight: 600 }}>%</span>
                  </div>
                  <div style={{ fontSize: 12, color: "#888", marginTop: 4 }}>Mandatory: 11% (2024–25)</div>
                </div>
              </div>
              <button onClick={calculate} style={{ width: "100%", marginTop: 24, padding: "16px", background: "linear-gradient(135deg, #059669, #0d9488)", color: "#fff", border: "none", borderRadius: 12, fontSize: 18, fontWeight: 700, cursor: "pointer" }}>
                Calculate Take-Home Pay
              </button>
            </div>

            {result && <>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(170px, 1fr))", gap: 16, marginBottom: 24 }}>
                {[
                  { label: `${pl} Gross`, value: fmt(result.perPeriod.gross), color: "#059669", bg: "#f0fdf4" },
                  { label: `${pl} Take-Home`, value: fmt(result.perPeriod.net), color: "#0d9488", bg: "#f0fdfa" },
                  { label: `${pl} Tax`, value: fmt(result.perPeriod.tax), color: "#dc2626", bg: "#fff5f5" },
                  { label: "Effective Tax Rate", value: pct(result.effectiveRate), color: "#d97706", bg: "#fffbeb" },
                  { label: `${pl} Super`, value: fmt(result.perPeriod.super), color: "#7c3aed", bg: "#f5f3ff" },
                ].map((item, i) => (
                  <div key={i} style={{ background: item.bg, borderRadius: 14, padding: 18, textAlign: "center", border: `2px solid ${item.color}22` }}>
                    <div style={{ fontSize: 22, fontWeight: 800, color: item.color }}>{item.value}</div>
                    <div style={{ fontSize: 13, color: "#555", marginTop: 4, fontWeight: 500 }}>{item.label}</div>
                  </div>
                ))}
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
                <div style={{ background: "#fff", borderRadius: 16, padding: 24, boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
                  <h3 style={{ margin: "0 0 18px", fontSize: 16, fontWeight: 700, color: "#1a1a2e" }}>Annual Tax Breakdown</h3>
                  {[
                    { label: "Gross Income", value: fmt(result.annualIncome), bold: true },
                    { label: "Income Tax (before offsets)", value: `−${fmt(result.incomeTax)}`, color: "#dc2626" },
                    { label: "Low Income Tax Offset", value: `+${fmt(result.lito)}`, color: "#059669" },
                    { label: "Tax after LITO", value: `−${fmt(result.taxAfterOffset)}`, color: "#dc2626" },
                    { label: "Medicare Levy (2%)", value: resident ? `−${fmt(result.medicareLevy)}` : "N/A (non-resident)", color: "#dc2626" },
                    { label: "Total Tax & Levy", value: `−${fmt(result.totalTax)}`, color: "#dc2626", bold: true },
                    { label: "Annual Take-Home", value: fmt(result.netAnnual), bold: true, color: "#059669", border: true },
                  ].map((row, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderTop: row.border ? "2px solid #e9ecef" : "1px solid #f1f3f5" }}>
                      <span style={{ fontSize: 14, color: "#444", fontWeight: row.bold ? 700 : 400 }}>{row.label}</span>
                      <span style={{ fontSize: 14, fontWeight: row.bold ? 700 : 600, color: row.color || "#222" }}>{row.value}</span>
                    </div>
                  ))}
                </div>
                <div style={{ background: "#fff", borderRadius: 16, padding: 24, boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
                  <h3 style={{ margin: "0 0 18px", fontSize: 16, fontWeight: 700, color: "#1a1a2e" }}>All Periods</h3>
                  {[
                    { label: "Frequency", cols: ["Monthly", "Fortnightly", "Weekly"] },
                    { label: "Gross", cols: [fmt(result.annualIncome/12), fmt(result.annualIncome/26), fmt(result.annualIncome/52)] },
                    { label: "Tax", cols: [fmt(result.totalTax/12), fmt(result.totalTax/26), fmt(result.totalTax/52)], color: "#dc2626" },
                    { label: "Take-Home", cols: [fmt(result.netAnnual/12), fmt(result.netAnnual/26), fmt(result.netAnnual/52)], color: "#059669", bold: true },
                    { label: "Super", cols: [fmt(result.superAmt/12), fmt(result.superAmt/26), fmt(result.superAmt/52)], color: "#7c3aed" },
                  ].map((row, i) => (
                    <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 4, padding: "9px 0", borderTop: "1px solid #f1f3f5" }}>
                      <span style={{ fontSize: 13, color: "#666", fontWeight: row.bold ? 700 : 400 }}>{row.label}</span>
                      {row.cols.map((c, j) => <span key={j} style={{ fontSize: 13, fontWeight: row.bold ? 700 : 500, color: row.color || "#222", textAlign: "right" }}>{c}</span>)}
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ background: "#fff3cd", border: "1px solid #ffc107", borderRadius: 12, padding: 16, fontSize: 13, color: "#664d03" }}>
                <strong>Estimate only.</strong> Does not include private health insurance rebate, HELP/HECS debt, family tax benefits, or other offsets. Use the <a href="https://www.ato.gov.au/calculators-and-tools/" style={{ color: "#664d03" }}>ATO's official calculator</a> for precise figures.
              </div>
            </>}

            <div style={{ background: "#fff", borderRadius: 16, padding: 24, boxShadow: "0 2px 12px rgba(0,0,0,0.06)", marginTop: 24 }}>
              <h3 style={{ margin: "0 0 16px", fontSize: 16, fontWeight: 700, color: "#1a1a2e" }}>📊 2025–26 ATO Tax Brackets (Australian Residents)</h3>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <thead><tr style={{ background: "#f0fdf4" }}>{["Taxable Income", "Tax Rate", "Tax on This Portion"].map(h => <th key={h} style={{ padding: "10px 14px", textAlign: "left", fontWeight: 700, color: "#333" }}>{h}</th>)}</tr></thead>
                  <tbody>
                    {[
                      ["$0 – $18,200", "0%", "Nil"],
                      ["$18,201 – $45,000", "16c for each $1 over $18,200", "Up to $4,288"],
                      ["$45,001 – $135,000", "30c for each $1 over $45,000", "Up to $27,000"],
                      ["$135,001 – $190,000", "37c for each $1 over $135,000", "Up to $20,350"],
                      ["$190,001+", "45c for each $1 over $190,000", "—"],
                    ].map((row, i) => (
                      <tr key={i} style={{ borderBottom: "1px solid #f1f3f5", background: i % 2 === 0 ? "#fff" : "#fafafa" }}>
                        {row.map((cell, j) => <td key={j} style={{ padding: "10px 14px", color: j === 1 ? "#059669" : "#333", fontWeight: j === 1 ? 600 : 400 }}>{cell}</td>)}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <p style={{ margin: "12px 0 0", fontSize: 13, color: "#888" }}>Plus 2% Medicare Levy. LITO of up to $700 applies to residents. Super guarantee: 12% from 1 July 2025. Source: ato.gov.au</p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    //]]>
  </script>
</body>
</html>
